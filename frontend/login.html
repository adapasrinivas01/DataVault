<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DataVault</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>

<div class="container">
    <h1>Login</h1>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Email Address"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p id="message"></p>

    <p>
        Don't have an account?
        <a href="signup.html">Sign Up</a>
    </p>
</div>

<script src="login.js"></script>

</body>
</html>
